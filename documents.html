<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Codnell Chabalala | Documents</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ================= GLOBAL ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html, body{
    min-height:100%;
    display:flex;
    flex-direction:column;
}

body{
    background:#f4f6f9;
    color:#333;
    line-height:1.6;
    flex:1;
}

/* ================= NAVBAR ================= */
header{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(15,23,42,0.95);
    backdrop-filter:blur(12px);
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
}

header h1{
    color:white;
    font-size:20px;
}

nav{
    display:flex;
    gap:25px;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:500;
    position:relative;
}

nav a::after{
    content:'';
    position:absolute;
    width:0%;
    height:2px;
    background:#38bdf8;
    left:0;
    bottom:-5px;
    transition:0.3s;
}

nav a:hover::after{
    width:100%;
}

.menu-toggle{
    display:none;
    font-size:24px;
    color:white;
    cursor:pointer;
}

/* ================= DOCUMENTS ================= */
section{
    padding:120px 8% 70px 8%;
    flex:1;
}

h3{
    margin-bottom:30px;
    font-size:30px;
    color:#0f172a;
}

.documents{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.download-btn{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 20px;
    background:#0f172a;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
    transition:0.3s;
    width:fit-content;
}

.download-btn i{
    font-size:18px;
}

.download-btn:hover{
    background:#38bdf8;
    transform:translateY(-2px);
}

/* ================= FOOTER ================= */
footer{
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:auto;
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
    nav{
        position:fixed;
        top:70px;
        right:0;
        background:#0f172a;
        flex-direction:column;
        width:220px;
        padding:20px;
        display:none;
        height:calc(100% - 70px);
        overflow-y:auto;
        transition:0.3s;
    }
    nav.active{
        display:flex;
    }
    .menu-toggle{
        display:block;
    }
}

@media(max-width:600px){
    section{
        padding:140px 5% 50px 5%;
    }
    h3{
        font-size:26px;
    }
    .download-btn{
        font-size:14px;
        padding:10px 16px;
    }
    .download-btn i{
        font-size:16px;
    }
}
</style>
</head>

<body>

<header>
<h1>Codnell Chabalala</h1>
<i class="fas fa-bars menu-toggle" onclick="toggleMenu()"></i>

<nav id="nav-links">
<a href="index.html">Home</a>
<a href="documents.html">Documents</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section id="documents">
<h3>Available Documents</h3>
<div class="documents">
    <a href="documents/CV.pdf" download class="download-btn"><i class="fas fa-download"></i> CV</a>
    <a href="documents/Codnell.academic transcript.pdf" download class="download-btn"><i class="fas fa-download"></i> Academic Record</a>
    <a href="documents/Qalification.pdf" download class="download-btn"><i class="fas fa-download"></i> Qualification</a>
    <a href="documents/Codnell. MATRIC.pdf" download class="download-btn"><i class="fas fa-download"></i> Matric Certificate</a>
</div>
</section>

<footer>
<p>© 2026 Codnell Chabalala | Computer Systems Engineer</p>
</footer>

<script>
function toggleMenu(){
    document.getElementById("nav-links").classList.toggle("active");
}
</script>

</body>
</html>
